<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bakımdayız</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0b1220;
        color: #e7eefc;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      }

      .wrap {
        text-align: center;
        padding: 24px;
      }

      .hourglass {
        width: 72px;
        height: 72px;
        display: inline-block;
        animation: spin 1.6s ease-in-out infinite;
        transform-origin: 50% 50%;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        50% {
          transform: rotate(180deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      h1 {
        margin: 14px 0 0;
        font-size: 20px;
        font-weight: 600;
        letter-spacing: 0.2px;
      }
    </style>
  </head>
  <body>
    <main class="wrap" aria-label="Bakım sayfası">
      <svg class="hourglass" viewBox="0 0 24 24" role="img" aria-label="Kum saati">
        <path
          fill="currentColor"
          d="M6 2a1 1 0 0 0 0 2h1v2.2c0 1.4.62 2.72 1.7 3.6L11 12l-2.3 2.2A4.94 4.94 0 0 0 7 17.8V20H6a1 1 0 1 0 0 2h12a1 1 0 1 0 0-2h-1v-2.2c0-1.4-.62-2.72-1.7-3.6L13 12l2.3-2.2A4.94 4.94 0 0 0 17 6.2V4h1a1 1 0 1 0 0-2H6Zm3 4.2V4h6v2.2c0 .84-.37 1.64-1.02 2.24L12 10.29 10.02 8.44A3.15 3.15 0 0 1 9 6.2Zm6 11.6V20H9v-2.2c0-.84.37-1.64 1.02-2.24L12 13.71l1.98 1.85A3.15 3.15 0 0 1 15 17.8Z"
        />
      </svg>
      <h1>Bakımdayız</h1>
    </main>
  </body>
</html>
